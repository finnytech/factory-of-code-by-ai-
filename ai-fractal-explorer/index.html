<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fractal Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <header>
            <h1>AI Fractal Explorer</h1>
            <p>Interactive Mandelbrot/Julia Set with AI Parameters</p>
        </header>
        <div class="controls">
            <div class="control-group">
                <label for="zoom">Zoom Level</label>
                <input type="range" id="zoom" min="0.1" max="10" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <label for="iterations">Iterations</label>
                <input type="range" id="iterations" min="10" max="500" step="10" value="100">
            </div>
            <div class="control-group">
                <label for="color-shift">Color Shift</label>
                <input type="range" id="color-shift" min="0" max="10" step="0.1" value="1.0">
            </div>
            <button id="mutate-btn">AI Mutate</button>
            <button id="toggle-mode">Toggle Julia/Mandelbrot</button>
        </div>
        <div class="status-panel">
            <span>Status: <span id="status" class="active">Rendering...</span></span>
            <span>Coord: <span id="coordinates">0.0, 0.0</span></span>
        </div>
    </div>
    <canvas id="fractal-canvas"></canvas>

    <script src="shader.js"></script>
    <script src="app.js"></script>
</body>
</html>
