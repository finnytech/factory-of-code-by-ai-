<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth-Wave-Maker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SYNTH WAVE MAKER</h1>
            <p>Retro Web Audio Synthesizer</p>
        </header>

        <div class="synth-panel">
            <div class="controls">
                <div class="control-group">
                    <h3>Oscillator</h3>
                    <label for="waveform">Waveform</label>
                    <select id="waveform">
                        <option value="sawtooth">Sawtooth</option>
                        <option value="square">Square</option>
                        <option value="sine">Sine</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </div>

                <div class="control-group">
                    <h3>Envelope</h3>
                    <label for="attack">Attack</label>
                    <input type="range" id="attack" min="0.01" max="2" step="0.01" value="0.1">
                    <span id="attack-val">0.1s</span>

                    <label for="release">Release</label>
                    <input type="range" id="release" min="0.01" max="3" step="0.01" value="0.5">
                    <span id="release-val">0.5s</span>
                </div>

                <div class="control-group">
                    <h3>Volume</h3>
                    <input type="range" id="master-volume" min="0" max="1" step="0.01" value="0.5">
                    <span id="vol-val">50%</span>
                </div>
            </div>

            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div class="keyboard" id="keyboard">
                <!-- Keys will be generated by JS -->
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="visualizer.js"></script>
    <script src="ui.js"></script>
</body>
</html>
